<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Attendance Scan</title>
</head>
<body>
  <h2>Scan QR Code to Mark Attendance</h2>
  <div id="qr-reader" style="width:100%; max-width:400px; margin:auto;"></div>
  <div id="qr-result" style="text-align:center; margin-top:10px; font-weight:bold;"></div>

  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <script>
    let ws = new WebSocket("ws://localhost:8080"); // same server as teacher portal

    function onScanSuccess(decodedText) {
        document.getElementById('qr-result').innerText = `Attendance Marked for ${decodedText}`;
        // Send attendance to server
        ws.send(JSON.stringify({ type: "attendance", sessionId: decodedText }));
        html5QrcodeScanner.clear();
    }

    let html5QrcodeScanner = new Html5Qrcode("qr-reader");

    Html5Qrcode.getCameras().then(cameras => {
        if(cameras.length) {
            html5QrcodeScanner.start(cameras[0].id, { fps:10, qrbox:250 }, onScanSuccess);
        } else {
            document.getElementById('qr-result').innerText = "No camera found!";
        }
    }).catch(err => {
        console.error(err);
        document.getElementById('qr-result').innerText = "Camera access denied or not supported!";
    });
  </script>
</body>
</html>
